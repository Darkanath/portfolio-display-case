services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
    environment:
      - VITE_EXPERIENCE_API=http://localhost:5001
      - VITE_PERSONA_API=http://localhost:5002
      - VITE_AGENT_API=http://localhost:5003
    depends_on:
      - experience-api
      - persona-api
      - agent-api

  experience-api:
    build: ./services/experience-api
    ports:
      - "127.0.0.1:5001:8080"
    environment:
      - PORT=8080
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  persona-api:
    build: ./services/persona-api
    ports:
      - "127.0.0.1:5002:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3

  agent-api:
    build: ./services/agent-api
    ports:
      - "127.0.0.1:5003:8080"
    environment:
      - PORT=8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EXPERIENCE_API_URL=http://experience-api:8080
      - PERSONA_API_URL=http://persona-api:8080
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - experience-api
      - persona-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
