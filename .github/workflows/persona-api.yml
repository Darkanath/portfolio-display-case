name: persona-api

on:
  push:
    branches: [main]
    paths:
      - "services/persona-api/**"
      - ".github/workflows/persona-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/persona-api/**"
  workflow_dispatch:

# OIDC auth to Azure — no long-lived secrets in GitHub.
permissions:
  contents: read
  packages: write
  id-token: write

env:
  AZURE_RESOURCE_GROUP: portfolio-display-case
  CONTAINER_APP_NAME: persona-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v7

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/persona-api" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/persona-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha,scope=persona-api
          cache-to: type=gha,scope=persona-api,mode=max

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision to Container Apps
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az containerapp update \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "${{ needs.build-and-push.outputs.image_name }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Smoke test
        run: |
          url="${{ vars.VITE_PERSONA_API }}/health"
          for i in $(seq 1 10); do
            status=$(curl -sf "$url" | jq -r .status 2>/dev/null || true)
            if [ "$status" = "ok" ]; then
              echo "Healthy: $url"
              exit 0
            fi
            echo "Attempt $i/10: $url not healthy yet, retrying in 5s..."
            sleep 5
          done
          echo "::error::$url did not report healthy after deploy"
          exit 1
