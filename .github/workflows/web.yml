name: web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Test
        run: npm test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_EXPERIENCE_API: ${{ vars.VITE_EXPERIENCE_API }}
          VITE_PERSONA_API: ${{ vars.VITE_PERSONA_API }}
          VITE_AGENT_API: ${{ vars.VITE_AGENT_API }}

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name portfolio-display-case
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
